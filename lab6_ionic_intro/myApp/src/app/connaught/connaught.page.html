<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Connaught</ion-title>
    <ion-buttons slot="start"><ion-back-button></ion-back-button></ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">connaught</ion-title>
    </ion-toolbar>
  </ion-header>
  
  <ion-img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e1/Flag_of_Connacht.svg/1280px-Flag_of_Connacht.svg.png" alt="Connaught img"></ion-img>

  <ion-list>
    @for (province of provinces; track province) {
      <ion-item>{{province.name}}</ion-item>
    }
  </ion-list>
</ion-content>
