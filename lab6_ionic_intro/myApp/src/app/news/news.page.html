<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>news</ion-title>
    <ion-button slot="start"><ion-back-button></ion-back-button></ion-button>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <!-- <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">news</ion-title>
    </ion-toolbar>
  </ion-header> -->

  <ion-list [inset]="true">
    @for (story of stories; track story) {
      <ion-item>
        <ion-label>{{story.title}}</ion-label>
        <ion-label>{{story.author}}</ion-label>
        <img src="{{story.urlToImage}}" />
      </ion-item>
    }
      
     
    </ion-list>

</ion-content>
